<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant ID Flashcards</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f0f4f8;
      color: #1a202c;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
    }

    .counter {
      text-align: center;
      margin: 0 0 10px 0;
      color: #475569;
    }

    .deck-status {
      text-align: center;
      margin: 0 0 18px 0;
      color: #64748b;
      font-size: 14px;
    }

    .top-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .admin-toggle-row {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .admin-panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .admin-panel h2 {
      margin: 0 0 14px 0;
      font-size: 20px;
    }

    .admin-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .admin-note {
      font-size: 14px;
      color: #64748b;
      margin: 0;
    }

    .card-wrap {
      perspective: 1000px;
      margin-top: 24px;
      height: 460px;
    }

    .flashcard {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: auto;
    }

    .card-front {
      z-index: 2;
    }

    .card-back {
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .images {
      display: grid;
      gap: 12px;
      justify-content: center;
      align-content: center;
      height: 100%;
    }

    .images.one {
      grid-template-columns: 1fr;
    }

    .images.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .images.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .images img {
      width: 100%;
      max-width: 100%;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .images.one img {
      max-height: 340px;
    }

    .images.two img {
      max-height: 280px;
    }

    .images.three img {
      max-height: 220px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button.secondary {
      background: #64748b;
    }

    button.danger {
      background: #dc2626;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .study-controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .answer {
      font-size: 32px;
      white-space: pre-wrap;
    }

    .quiz-card,
    .results-card,
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .quiz-images {
      display: grid;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .quiz-images.one {
      grid-template-columns: 1fr;
    }

    .quiz-images.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .quiz-images.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .quiz-images img {
      width: 100%;
      max-width: 100%;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .quiz-images.one img {
      max-height: 320px;
    }

    .quiz-images.two img {
      max-height: 240px;
    }

    .quiz-images.three img {
      max-height: 190px;
    }

    .quiz-label,
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .quiz-input,
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .quiz-nav {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .results-score {
      font-size: 40px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .results-sub {
      text-align: center;
      margin-bottom: 24px;
      color: #475569;
    }

    .result-item {
      border-top: 1px solid #e2e8f0;
      padding: 16px 0;
    }

    .result-item:first-child {
      border-top: none;
      padding-top: 0;
    }

    .correct {
      color: #15803d;
      font-weight: 600;
    }

    .incorrect {
      color: #b91c1c;
      font-weight: 600;
    }

    .hidden-file-input {
      display: none;
    }

    .empty-message {
      text-align: center;
      color: #64748b;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .wrap {
        max-width: 100%;
      }

      .card-wrap {
        height: 420px;
      }

      .answer {
        font-size: 24px;
      }

      .top-controls,
      .study-controls,
      .quiz-nav,
      .admin-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .top-controls button,
      .study-controls button,
      .quiz-nav button,
      .admin-controls button {
        width: 100%;
      }

      .images.two,
      .images.three,
      .quiz-images.two,
      .quiz-images.three {
        grid-template-columns: 1fr;
      }

      .images.two img,
      .images.three img,
      .quiz-images.two img,
      .quiz-images.three img {
        max-height: 220px;
      }

      .quiz-input,
      .form-input,
      .form-textarea {
        font-size: 16px;
      }

      .results-score {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Plant ID Flashcards</h1>
    <p class="counter" id="counter"></p>
    <p class="deck-status" id="deckStatus"></p>

    <div class="top-controls">
      <button id="studyModeBtn" onclick="switchMode('study')">Study</button>
      <button class="secondary" id="quizModeBtn" onclick="startQuiz()">Quiz</button>
    </div>

    <div class="admin-toggle-row">
      <button class="secondary" onclick="toggleAdminPanel()">
        <span id="adminToggleText">Admin tools</span>
      </button>
    </div>

    <div id="adminPanel" style="display:none;"></div>
    <div id="app"></div>
  </div>

  <script src="cards.js"></script>
  <script>
    const builtInCards = Array.isArray(cards) ? cards.map(card => ({ ...card })) : [];
    let activeCards = builtInCards.map(card => ({ ...card }));
    let deckLabel = "Built-in deck";

    let mode = "study";
    let currentIndex = 0;
    let showingAnswer = false;

    let quizCards = [];
    let quizAnswers = [];
    let currentQuizIndex = 0;
    let showingResults = false;

    let adminPanelOpen = false;
    let showingForm = false;
    let editingCardId = null;

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getCurrentCards() {
      return activeCards;
    }

    function updateDeckStatus() {
      const deckStatus = document.getElementById("deckStatus");
      deckStatus.textContent = `${deckLabel} · ${getCurrentCards().length} cards`;
    }

    function switchMode(newMode) {
      mode = newMode;
      showingResults = false;
      showingForm = false;
      updateModeButtons();
      renderApp();
    }

    function updateModeButtons() {
      const studyBtn = document.getElementById("studyModeBtn");
      const quizBtn = document.getElementById("quizModeBtn");

      if (mode === "study") {
        studyBtn.classList.remove("secondary");
        quizBtn.classList.add("secondary");
      } else {
        quizBtn.classList.remove("secondary");
        studyBtn.classList.add("secondary");
      }
    }

    function toggleAdminPanel() {
      adminPanelOpen = !adminPanelOpen;
      renderAdminPanel();
    }

    function renderAdminPanel() {
      const panel = document.getElementById("adminPanel");
      const toggleText = document.getElementById("adminToggleText");
      toggleText.textContent = adminPanelOpen ? "Hide admin tools" : "Admin tools";

      if (!adminPanelOpen) {
        panel.style.display = "none";
        panel.innerHTML = "";
        return;
      }

      panel.style.display = "block";
      panel.innerHTML = `
        <div class="admin-panel">
          <h2>Admin tools</h2>
          <div class="admin-controls">
            <button onclick="openAddCardForm()">Add Card</button>
            <button class="secondary" onclick="openEditCurrentCard()">Edit Current Card</button>
            <button class="danger" onclick="deleteCurrentCard()">Delete Current Card</button>
            <button class="secondary" onclick="exportDeck()">Export Deck</button>
            <button class="secondary" onclick="triggerImportDeck()">Import Deck</button>
            <button class="secondary" onclick="resetToBuiltInDeck()">Reset to Built-in Deck</button>
          </div>
          <p class="admin-note">Edits affect the currently loaded deck in this session. Export the deck to keep or share your changes.</p>
        </div>
      `;
    }

    function formatBotanicalText(text) {
      return text;
    }

    function renderStudyMode() {
      const currentCards = getCurrentCards();

      if (!currentCards.length) {
        document.getElementById("counter").textContent = "No cards";
        document.getElementById("app").innerHTML = `
          <div class="results-card">
            <p class="empty-message">No cards available in this deck.</p>
          </div>
        `;
        return;
      }

      if (currentIndex >= currentCards.length) currentIndex = 0;

      const card = currentCards[currentIndex];
      const images = [
        card.front_image_url_1,
        card.front_image_url_2,
        card.front_image_url_3
      ].filter(Boolean);

      document.getElementById("counter").textContent =
        `Card ${currentIndex + 1} of ${currentCards.length}`;

      document.getElementById("app").innerHTML = `
        <div class="card-wrap">
          <div class="flashcard ${showingAnswer ? 'flipped' : ''}" id="flashcard" onclick="toggleAnswer()">
            <div class="card-face card-front">
              <div class="images ${images.length === 1 ? 'one' : images.length === 2 ? 'two' : 'three'}">
                ${images.map(url => `<img src="${escapeHtml(url)}" alt="Plant image" onerror="this.style.display='none'">`).join("")}
              </div>
            </div>
            <div class="card-face card-back">
              <div class="answer">${escapeHtml(formatBotanicalText(card.back_text))}</div>
            </div>
          </div>
        </div>

        <div class="study-controls">
          <button onclick="toggleAnswer()">Flip Card</button>
          <button class="secondary" onclick="prevCard()" ${currentIndex === 0 ? "disabled" : ""}>Previous</button>
          <button class="secondary" onclick="nextCard()" ${currentIndex === currentCards.length - 1 ? "disabled" : ""}>Next</button>
        </div>
      `;
    }

    function renderQuizMode() {
      if (showingResults) {
        renderResults();
        return;
      }

      const card = quizCards[currentQuizIndex];
      const images = [
        card.front_image_url_1,
        card.front_image_url_2,
        card.front_image_url_3
      ].filter(Boolean);

      document.getElementById("counter").textContent =
        `Question ${currentQuizIndex + 1} of ${quizCards.length}`;

      document.getElementById("app").innerHTML = `
        <div class="quiz-card">
          <div class="quiz-images ${images.length === 1 ? 'one' : images.length === 2 ? 'two' : 'three'}">
            ${images.map(url => `<img src="${escapeHtml(url)}" alt="Plant image" onerror="this.style.display='none'">`).join("")}
          </div>

          <label class="quiz-label" for="quizAnswer">What is the name of this plant?</label>
          <input
            id="quizAnswer"
            class="quiz-input"
            type="text"
            value="${escapeHtml(quizAnswers[currentQuizIndex] || "")}"
            oninput="quizAnswers[${currentQuizIndex}] = this.value"
            placeholder="Enter plant name"
          >

          <div class="quiz-nav">
            <button class="secondary" onclick="prevQuizQuestion()" ${currentQuizIndex === 0 ? "disabled" : ""}>Previous</button>
            ${
              currentQuizIndex === quizCards.length - 1
                ? `<button onclick="submitQuiz()">Submit Quiz</button>`
                : `<button onclick="nextQuizQuestion()">Next</button>`
            }
          </div>
        </div>
      `;

      const input = document.getElementById("quizAnswer");
      if (input) input.focus();
    }

    function renderResults() {
      let score = 0;

      const resultsHtml = quizCards.map((card, index) => {
        const userAnswer = (quizAnswers[index] || "").trim();
        const latinName = getLatinName(card.back_text);
        const result = checkQuizAnswer(userAnswer, card.back_text);

        if (result.isCorrect) score++;

        return `
          <div class="result-item">
            <div class="${result.isCorrect ? 'correct' : 'incorrect'}">
              ${result.isCorrect ? "Correct" : "Incorrect"}
            </div>
            <div><strong>Your answer:</strong> ${escapeHtml(userAnswer || "(blank)")}</div>
            <div><strong>Correct Latin name:</strong> ${escapeHtml(latinName)}</div>
            ${result.note ? `<div style="margin-top:6px; color:#475569;"><em>${escapeHtml(result.note)}</em></div>` : ""}
          </div>
        `;
      }).join("");

      document.getElementById("counter").textContent = `Quiz complete`;

      document.getElementById("app").innerHTML = `
        <div class="results-card">
          <div class="results-score">${score} / ${quizCards.length}</div>
          <div class="results-sub">Marks awarded for correct Latin names only</div>
          ${resultsHtml}
          <div class="study-controls">
            <button onclick="startQuiz()">New Quiz</button>
            <button class="secondary" onclick="switchMode('study')">Back to Study</button>
          </div>
        </div>
      `;
    }

    function renderForm() {
      const currentCards = getCurrentCards();
      const editingCard = editingCardId ? currentCards.find(card => card.id === editingCardId) : null;
      const isEditing = !!editingCard;

      document.getElementById("counter").textContent = isEditing ? "Edit card" : "Add card";

      document.getElementById("app").innerHTML = `
        <div class="form-card">
          <div class="form-group">
            <label class="form-label" for="front1">Front Image 1</label>
            <input id="front1" class="form-input" type="url" value="${escapeHtml(editingCard?.front_image_url_1 || "")}" placeholder="https://...">
          </div>

          <div class="form-group">
            <label class="form-label" for="front2">Front Image 2</label>
            <input id="front2" class="form-input" type="url" value="${escapeHtml(editingCard?.front_image_url_2 || "")}" placeholder="https://...">
          </div>

          <div class="form-group">
            <label class="form-label" for="front3">Front Image 3</label>
            <input id="front3" class="form-input" type="url" value="${escapeHtml(editingCard?.front_image_url_3 || "")}" placeholder="https://...">
          </div>

          <div class="form-group">
            <label class="form-label" for="backText">Back Text</label>
            <textarea id="backText" class="form-textarea" placeholder="Botanical name&#10;&#10;(common name)">${escapeHtml(editingCard?.back_text || "")}</textarea>
          </div>

          <div class="study-controls">
            <button onclick="saveCardForm()">${isEditing ? "Save Changes" : "Add Card"}</button>
            <button class="secondary" onclick="cancelCardForm()">Cancel</button>
          </div>
        </div>
      `;
    }

    function normalize(text) {
      return text
        .toLowerCase()
        .replace(/[^\w\s×]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getLatinName(backText) {
      return backText.split("\n")[0].trim();
    }

    function getCommonName(backText) {
      const match = backText.match(/\(([^)]+)\)/);
      return match ? match[1].trim() : "";
    }

    function checkQuizAnswer(userAnswer, backText) {
      const latinName = getLatinName(backText);
      const commonName = getCommonName(backText);

      const cleanedUser = normalize(userAnswer);
      const cleanedLatin = normalize(latinName);
      const cleanedCommon = normalize(commonName);

      if (cleanedUser === cleanedLatin) {
        return {
          isCorrect: true,
          note: "Correct Latin name"
        };
      }

      if (cleanedCommon && cleanedUser === cleanedCommon) {
        return {
          isCorrect: false,
          note: "Common name recognised, but no mark for v1"
        };
      }

      return {
        isCorrect: false,
        note: ""
      };
    }

    function startQuiz() {
      const currentCards = getCurrentCards();
      const shuffled = shuffleArray(currentCards);
      quizCards = shuffled.slice(0, Math.min(10, shuffled.length));
      quizAnswers = new Array(quizCards.length).fill("");
      currentQuizIndex = 0;
      showingResults = false;
      showingForm = false;
      mode = "quiz";
      updateModeButtons();
      renderApp();
    }

    function nextQuizQuestion() {
      if (currentQuizIndex < quizCards.length - 1) {
        currentQuizIndex++;
        renderApp();
      }
    }

    function prevQuizQuestion() {
      if (currentQuizIndex > 0) {
        currentQuizIndex--;
        renderApp();
      }
    }

    function submitQuiz() {
      showingResults = true;
      renderApp();
    }

    function toggleAnswer() {
      showingAnswer = !showingAnswer;
      renderApp();
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        showingAnswer = false;
        renderApp();
      }
    }

    function nextCard() {
      const currentCards = getCurrentCards();
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        showingAnswer = false;
        renderApp();
      }
    }

    function openAddCardForm() {
      mode = "study";
      showingResults = false;
      showingForm = true;
      editingCardId = null;
      updateModeButtons();
      renderApp();
    }

    function openEditCurrentCard() {
      const currentCards = getCurrentCards();
      if (!currentCards.length) return;
      mode = "study";
      showingResults = false;
      showingForm = true;
      editingCardId = currentCards[currentIndex].id;
      updateModeButtons();
      renderApp();
    }

    function cancelCardForm() {
      showingForm = false;
      editingCardId = null;
      renderApp();
    }

    function saveCardForm() {
      const front1 = document.getElementById("front1").value.trim();
      const front2 = document.getElementById("front2").value.trim();
      const front3 = document.getElementById("front3").value.trim();
      const backText = document.getElementById("backText").value.trim();

      if (!backText) {
        alert("Back Text is required.");
        return;
      }

      const newCard = {
        id: editingCardId || `card_${Date.now()}`,
        front_image_url_1: front1,
        front_image_url_2: front2,
        front_image_url_3: front3,
        back_text: backText
      };

      if (editingCardId) {
        activeCards = activeCards.map(card => card.id === editingCardId ? newCard : card);
      } else {
        activeCards.push(newCard);
        currentIndex = activeCards.length - 1;
      }

      showingForm = false;
      editingCardId = null;
      showingAnswer = false;
      renderApp();
    }

    function deleteCurrentCard() {
      const currentCards = getCurrentCards();
      if (!currentCards.length) return;

      const card = currentCards[currentIndex];
      const ok = confirm(`Delete this card?\n\n${card.back_text.split("\n")[0]}`);
      if (!ok) return;

      activeCards = activeCards.filter(item => item.id !== card.id);

      if (currentIndex >= activeCards.length) {
        currentIndex = Math.max(0, activeCards.length - 1);
      }

      showingAnswer = false;
      showingForm = false;
      renderApp();
    }

    function exportDeck() {
      const currentCards = getCurrentCards();
      const blob = new Blob([JSON.stringify(currentCards, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "plant-id-deck.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function triggerImportDeck() {
      document.getElementById("deckFileInput").click();
    }

    function handleImportDeck(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);

          if (!Array.isArray(imported)) {
            alert("That file does not contain a valid deck.");
            return;
          }

          const cleaned = imported.filter(card =>
            card &&
            typeof card === "object" &&
            typeof card.back_text === "string"
          ).map((card, index) => ({
            id: card.id || `imported_${index + 1}`,
            front_image_url_1: card.front_image_url_1 || "",
            front_image_url_2: card.front_image_url_2 || "",
            front_image_url_3: card.front_image_url_3 || "",
            back_text: card.back_text || ""
          }));

          if (!cleaned.length) {
            alert("That file did not contain any usable cards.");
            return;
          }

          activeCards = cleaned;
          deckLabel = `Imported deck: ${file.name}`;
          currentIndex = 0;
          showingAnswer = false;
          showingResults = false;
          showingForm = false;
          editingCardId = null;
          mode = "study";
          updateDeckStatus();
          updateModeButtons();
          renderApp();
        } catch (error) {
          alert("Could not read that deck file.");
        } finally {
          event.target.value = "";
        }
      };

      reader.readAsText(file);
    }

    function resetToBuiltInDeck() {
      activeCards = builtInCards.map(card => ({ ...card }));
      deckLabel = "Built-in deck";
      currentIndex = 0;
      showingAnswer = false;
      showingResults = false;
      showingForm = false;
      editingCardId = null;
      mode = "study";
      updateDeckStatus();
      updateModeButtons();
      renderApp();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderApp() {
      updateDeckStatus();
      renderAdminPanel();

      if (showingForm) {
        renderForm();
        return;
      }

      if (mode === "study") {
        renderStudyMode();
      } else {
        renderQuizMode();
      }
    }

    updateDeckStatus();
    updateModeButtons();
    renderAdminPanel();
    renderApp();
  </script>
</body>
</html>
