<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant ID Flashcards</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f0f4f8;
      color: #1a202c;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
    }

    .card-wrap {
  perspective: 1000px;
  margin-top: 24px;
  height: 460px;
}

.flashcard {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s;
  cursor: pointer;
}
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  overflow: auto;
}

    .card-front {
      z-index: 2;
    }

    .card-back {
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .images {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .images img {
      max-width: 280px;
      max-height: 280px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
      margin-right: 8px;
    }

    button.secondary {
      background: #64748b;
    }

    .answer {
      font-size: 32px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Plant ID Flashcards</h1>
    <p id="counter"></p>

    <div class="card-wrap">
      <div class="flashcard" id="flashcard" onclick="toggleAnswer()">
        <div class="card-face card-front">
          <div class="images" id="images"></div>
        </div>
        <div class="card-face card-back">
          <div class="answer" id="answer"></div>
        </div>
      </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
  <button onclick="toggleAnswer()">Flip Card</button>
  <button class="secondary" onclick="prevCard()">Previous</button>
  <button class="secondary" onclick="nextCard()">Next</button>
</div>
  </div>

  <script>
    const cards = [
      {
        id: "card_2",
        front_image_url_1: "https://apps.rhs.org.uk/plantselectorimages/detail/WSY0034506_4674.jpg",
        front_image_url_2: "https://apps.rhs.org.uk/plantselectorimages/detail/moja02566.jpg",
        front_image_url_3: "",
        back_text: `Griselinia littoralis

(New Zealand broadleaf)`
      },
      {
        id: "card_3",
        front_image_url_1: "https://apps.rhs.org.uk/plantselectorimages/detail/elbo14556.jpg",
        front_image_url_2: "https://apps.rhs.org.uk/plantselectorimages/detail/visi191021.jpg",
        front_image_url_3: "",
        back_text: `Ligustrum ovalifolium

(Garden privet)`
      },
      {
        id: "card_4",
        front_image_url_1: "https://apps.rhs.org.uk/plantselectorimages/detail/RHS_WSYD0003474_788.JPG",
        front_image_url_2: "https://apps.rhs.org.uk/plantselectorimages/detail/RHS_WSYD0000553_788.JPG",
        front_image_url_3: "https://apps.rhs.org.uk/plantselectorimages/detail/Web_Use-PUB0012020_788.jpg",
        back_text: `Fatsia japonica

(Japanese aralia)`
      }
    ];

    let currentIndex = 0;
    let showingAnswer = false;

    function renderCard() {
      const card = cards[currentIndex];
      const images = [
        card.front_image_url_1,
        card.front_image_url_2,
        card.front_image_url_3
      ].filter(Boolean);

      document.getElementById("counter").textContent =
        `Card ${currentIndex + 1} of ${cards.length}`;

      document.getElementById("images").innerHTML = images
        .map(url => `<img src="${url}" alt="Plant image" onerror="this.style.display='none'">`)
        .join("");

      document.getElementById("answer").textContent = card.back_text;
      document.getElementById("flashcard").classList.toggle("flipped", showingAnswer);
    }

    function toggleAnswer() {
      showingAnswer = !showingAnswer;
      renderCard();
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        showingAnswer = false;
        renderCard();
      }
    }

    function nextCard() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        showingAnswer = false;
        renderCard();
      }
    }

    renderCard();
  </script>
</body>
</html>
